<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIVATEJA | MOBILE NEUMORPHIC</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Soft dark neumorphic base */
            --c-bg: #0e1116;
            --c-bg-light: #1b1f27;
            --c-bg-dark: #05070b;
            --c-accent: #00f3ff;
            --c-text: #e7edf7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--c-bg);
            color: var(--c-text);
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            overscroll-behavior: none;
        }

        /* --- CANVAS LAYER --- */
        #webgl {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            display: block;
        }

        /* --- NEUMORPHIC UTILS --- */
        .neo-surface {
            background: var(--c-bg);
            box-shadow:
                10px 10px 25px rgba(0, 0, 0, 0.5),
                -10px -10px 25px rgba(60, 70, 90, 0.35);
            border-radius: 18px;
        }

        .neo-inset {
            background: var(--c-bg);
            box-shadow:
                inset 6px 6px 14px rgba(0, 0, 0, 0.65),
                inset -6px -6px 14px rgba(60, 70, 90, 0.45);
            border-radius: 14px;
        }

        .neo-soft-text {
            text-shadow:
                2px 2px 3px rgba(0, 0, 0, 0.6),
                -1px -1px 2px rgba(255, 255, 255, 0.09);
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        /* --- HEADER CARD --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            padding: 10px 16px;
            border-radius: 16px;
            background: radial-gradient(circle at 0% 0%, #1e2430 0, var(--c-bg) 42%);
            box-shadow:
                6px 6px 16px rgba(0, 0, 0, 0.6),
                -4px -4px 12px rgba(60, 70, 90, 0.3);
        }

        .brand {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 4vw, 20px);
            letter-spacing: 3px;
            color: var(--c-text);
            text-transform: uppercase;
        }

        .meta-data {
            text-align: right;
            font-size: 9px;
            opacity: 0.7;
            letter-spacing: 2px;
            line-height: 1.5;
        }

        /* --- HERO CARD --- */
        .hero-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(92vw, 440px);
            padding: 22px 20px 26px;
            pointer-events: auto;
        }

        .hero-card {
            padding: 22px 20px 26px;
            border-radius: 22px;
            background: radial-gradient(circle at 20% 0%, #212837 0, var(--c-bg) 55%);
            box-shadow:
                12px 12px 28px rgba(0, 0, 0, 0.75),
                -10px -10px 26px rgba(65, 78, 105, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        .hero-glitch {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(30px, 9vw, 64px); 
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1;
            position: relative;
            color: transparent;
            -webkit-text-stroke: 1px rgba(231, 237, 247, 0.12);
        }
        
        .hero-glitch::before {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            color: var(--c-text);
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
            animation: textReveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards 1s;
            text-shadow:
                4px 4px 6px rgba(0, 0, 0, 0.6),
                -2px -2px 4px rgba(255, 255, 255, 0.06);
        }

        @keyframes textReveal {
            to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
        }

        .hero-glitch.secondary {
            font-size: clamp(18px, 5vw, 32px);
            -webkit-text-stroke: 0;
            opacity: 0.7;
        }

        .sub-hero {
            margin-top: 18px;
            font-size: clamp(11px, 3vw, 14px);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease forwards 2.5s;
            color: var(--c-accent);
            text-shadow:
                0 0 8px rgba(0, 243, 255, 0.5),
                2px 2px 3px rgba(0, 0, 0, 0.6);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- FOOTER CARD --- */
        footer {
            pointer-events: auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 16px;
        }

        .footer-card {
            flex: 1;
            padding: 14px 16px;
            border-radius: 18px;
            background: var(--c-bg);
            box-shadow:
                8px 8px 20px rgba(0, 0, 0, 0.7),
                -6px -6px 16px rgba(60, 70, 90, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding: 8px 12px;
            color: rgba(231, 237, 247, 0.7);
            text-decoration: none;
            border-radius: 999px;
            background: var(--c-bg);
            box-shadow:
                4px 4px 12px rgba(0, 0, 0, 0.6),
                -3px -3px 8px rgba(65, 78, 105, 0.36);
            transition: all 0.2s ease-out;
        }
        
        .nav-link:hover,
        .nav-link:focus-visible {
            color: var(--c-accent);
            box-shadow:
                inset 3px 3px 8px rgba(0, 0, 0, 0.7),
                inset -3px -3px 8px rgba(65, 78, 105, 0.5);
        }

        .nav-link:last-child {
            margin-bottom: 0;
        }

        .system-status {
            min-width: 110px;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .system-label {
            font-size: 9px;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        .progress-wrap {
            width: 110px;
            padding: 6px 8px;
            border-radius: 999px;
            background: var(--c-bg);
            box-shadow:
                inset 4px 4px 10px rgba(0, 0, 0, 0.8),
                inset -4px -4px 10px rgba(60, 70, 90, 0.45);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(145deg, #0b0d12, #141926);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f3ff, #ff00a8);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.75);
            animation: load 2s ease-in-out forwards;
            border-radius: inherit;
        }

        @keyframes load { to { width: 100%; } }

        /* --- LOADER NEUMORPHIC --- */
        #loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, #202634 0, var(--c-bg) 58%);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--c-accent);
            font-family: 'Syncopate';
            font-weight: 700;
            font-size: clamp(18px, 5vw, 34px);
            transition: opacity 0.9s ease;
        }

        #loader-inner {
            padding: 18px 28px;
            border-radius: 22px;
            background: var(--c-bg);
            box-shadow:
                10px 10px 24px rgba(0, 0, 0, 0.7),
                -10px -10px 24px rgba(70, 82, 110, 0.3);
            letter-spacing: 6px;
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            #ui-layer { padding: 20px; }
            header { padding: 8px 14px; }
            .hero-card { padding: 18px 16px 22px; }
            footer {
                flex-direction: column;
                align-items: stretch;
            }
            .footer-card {
                padding: 12px 14px;
            }
            #cursor, #cursor-dot { display: none !important; }
        }

        /* Hide custom cursor by default in this variant (optional) */
        #cursor, #cursor-dot { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div id="loader-inner">INITIALIZING</div>
    </div>

    <div id="cursor"></div>
    <div id="cursor-dot"></div>

    <canvas id="webgl"></canvas>

    <div id="ui-layer">
        <header>
            <div class="brand">SEENURI.DEV</div>
            <div class="meta-data">
                HYD // IND<br>
                ONLINE
            </div>
        </header>

        <div class="hero-container">
            <div class="hero-card">
                <div class="hero-glitch" data-text="SHIVATEJA">SHIVATEJA</div>
                <div class="hero-glitch secondary" data-text="SEENURI">SEENURI</div>
                <div class="sub-hero">Creative Technologist</div>
            </div>
        </div>

        <footer>
            <div class="footer-card">
                <div class="nav-links">
                    <a href="#" class="nav-link">01. Works</a>
                    <a href="#" class="nav-link">02. About</a>
                    <a href="mailto:stseenuri@outlook.com" class="nav-link">03. Contact</a>
                </div>
                <div class="system-status">
                    <div class="system-label">GPU ONLINE</div>
                    <div class="progress-wrap">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- THREE + GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        const CONFIG = {
            particleCount: isMobile ? 2500 : 6000, 
            particleSize: isMobile ? 0.04 : 0.02,
            colorA: new THREE.Color('#00f3ff'), 
            colorB: new THREE.Color('#ff0055')
        };

        class App {
            constructor() {
                this.canvas = document.querySelector('#webgl');
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.pixelRatio = Math.min(window.devicePixelRatio, 2);

                this.initThree();
                this.initParticles();
                this.addEvents();
                this.animate();
                
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').remove(), 900);
                }, 1000);
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x05070b, 0.022);

                this.camera = new THREE.PerspectiveCamera(75, this.width / this.height, 0.1, 100);
                this.camera.position.set(0, 0, isMobile ? 12 : 8);

                this.renderer = new THREE.WebGLRenderer({
                    canvas: this.canvas,
                    antialias: true,
                    powerPreference: "high-performance"
                });
                this.renderer.setSize(this.width, this.height);
                this.renderer.setPixelRatio(this.pixelRatio);
                this.renderer.setClearColor(0x0e1116);

                this.clock = new THREE.Clock();
                this.mouse = new THREE.Vector2(0, 0);
                this.targetMouse = new THREE.Vector2(0, 0);
            }

            initParticles() {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(CONFIG.particleCount * 3);
                const randoms = new Float32Array(CONFIG.particleCount * 3);
                
                for(let i = 0; i < CONFIG.particleCount; i++) {
                    const i3 = i * 3;
                    const r = 4 * Math.cbrt(Math.random());
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i3 + 2] = r * Math.cos(phi);

                    randoms[i3] = Math.random();
                    randoms[i3 + 1] = Math.random();
                    randoms[i3 + 2] = Math.random();
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));

                this.particleMaterial = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uMouse: { value: new THREE.Vector3(0, 0, 0) },
                        uPixelRatio: { value: this.pixelRatio },
                        uColorA: { value: CONFIG.colorA },
                        uColorB: { value: CONFIG.colorB }
                    },
                    vertexShader: `
                        uniform float uTime;
                        uniform vec3 uMouse;
                        uniform float uPixelRatio;
                        attribute vec3 aRandom;
                        varying vec3 vColor;
                        
                        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
                        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                        float snoise(vec3 v) {
                            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                            vec3 i  = floor(v + dot(v, C.yyy) );
                            vec3 x0 = v - i + dot(i, C.xxx) ;
                            vec3 g = step(x0.yzx, x0.xyz);
                            vec3 l = 1.0 - g;
                            vec3 i1 = min( g.xyz, l.zxy );
                            vec3 i2 = max( g.xyz, l.zxy );
                            vec3 x1 = x0 - i1 + C.xxx;
                            vec3 x2 = x0 - i2 + C.yyy;
                            vec3 x3 = x0 - D.yyy;
                            i = mod289(i);
                            vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                            float n_ = 0.142857142857;
                            vec3  ns = n_ * D.wyz - D.xzx;
                            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                            vec4 x_ = floor(j * ns.z);
                            vec4 y_ = floor(j - 7.0 * x_ );
                            vec4 x = x_ *ns.x + ns.yyyy;
                            vec4 y = y_ *ns.x + ns.yyyy;
                            vec4 h = 1.0 - abs(x) - abs(y);
                            vec4 b0 = vec4( x.xy, y.xy );
                            vec4 b1 = vec4( x.zw, y.zw );
                            vec4 s0 = floor(b0)*2.0 + 1.0;
                            vec4 s1 = floor(b1)*2.0 + 1.0;
                            vec4 sh = -step(h, vec4(0.0));
                            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                            vec3 p0 = vec3(a0.xy,h.x);
                            vec3 p1 = vec3(a0.zw,h.y);
                            vec3 p2 = vec3(a1.xy,h.z);
                            vec3 p3 = vec3(a1.zw,h.w);
                            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                            m = m * m;
                            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
                        }

                        void main() {
                            vec3 pos = position;
                            float time = uTime * 0.2;

                            pos.x += snoise(vec3(pos.x, pos.y, time)) * 0.4;
                            pos.y += snoise(vec3(pos.y, pos.z, time)) * 0.4;
                            pos.z += snoise(vec3(pos.z, pos.x, time)) * 0.4;

                            float dist = distance(pos.xy, uMouse.xy * 6.0);
                            if(dist < 4.0) {
                                vec3 dir = normalize(pos - vec3(uMouse.xy * 6.0, 0.0));
                                pos += dir * (4.0 - dist) * 0.8;
                            }

                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_Position = projectionMatrix * mvPosition;
                            
                            gl_PointSize = (12.0 * uPixelRatio) * (1.0 / -mvPosition.z);
                            
                            vColor = mix(vec3(0.0, 0.95, 1.0), vec3(1.0, 0.0, 0.33), position.z * 0.2 + 0.5);
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        void main() {
                            float strength = distance(gl_PointCoord, vec2(0.5));
                            strength = 1.0 - step(0.5, strength);
                            if(strength < 0.5) discard;
                            gl_FragColor = vec4(vColor, 1.0);
                        }
                    `,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                this.particles = new THREE.Points(geometry, this.particleMaterial);
                this.scene.add(this.particles);
            }

            addEvents() {
                window.addEventListener('resize', this.onResize.bind(this));
                
                window.addEventListener('mousemove', (e) => {
                    if(isMobile) return;
                    this.updateMouse(e.clientX, e.clientY);
                });

                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 0) {
                        this.updateMouse(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }, { passive: true });
                
                window.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 0) {
                        this.updateMouse(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }, { passive: true });
            }

            updateMouse(x, y) {
                this.targetMouse.x = (x / this.width) * 2 - 1;
                this.targetMouse.y = -(y / this.height) * 2 + 1;
            }

            onResize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.camera.aspect = this.width / this.height;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(this.width, this.height);
                this.particleMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                
                const time = this.clock.getElapsedTime();
                
                this.mouse.x += (this.targetMouse.x - this.mouse.x) * 0.1;
                this.mouse.y += (this.targetMouse.y - this.mouse.y) * 0.1;

                this.particles.rotation.y = time * 0.05;
                this.particles.rotation.x = this.mouse.y * 0.2;
                this.particles.rotation.z = this.mouse.x * 0.2;

                this.particleMaterial.uniforms.uTime.value = time;
                this.particleMaterial.uniforms.uMouse.value.set(this.mouse.x, this.mouse.y, 0);

                this.renderer.render(this.scene, this.camera);
            }
        }

        class TextScramble {
            constructor(el) {
                this.el = el;
                this.chars = '!<>-_\\\\/[]{}—=+*^?#________';
                this.update = this.update.bind(this);
            }
            setText(newText) {
                const oldText = this.el.innerText;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => this.resolve = resolve);
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    const start = Math.floor(Math.random() * 40);
                    const end = start + Math.floor(Math.random() * 40);
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }
            update() {
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span class="dud">${char}</span>`;
                    } else {
                        output += from;
                    }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                    this.frame++;
                }
            }
            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            
            const phrases = ['RPA ARCHITECT', 'WEB DEVELOPER', 'UI DESIGNER', 'DIGITAL CREATOR'];
            const el = document.querySelector('.sub-hero');
            const fx = new TextScramble(el);
            
            let counter = 0;
            const next = () => {
                fx.setText(phrases[counter]).then(() => {
                    setTimeout(next, 2000);
                });
                counter = (counter + 1) % phrases.length;
            };
            
            setTimeout(next, 3000);
        });
    </script>
</body>
</html>
